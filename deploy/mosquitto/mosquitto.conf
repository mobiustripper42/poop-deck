# Poop Deck :: Mosquitto
# One plain listener, authenticated. Anonymous access is off; every client
# authenticates and is confined to its own topics by the ACL file.
#
# The password file is generated at container start from the MQTT_* env vars
# (see the mosquitto `command:` in docker-compose.yml) and written to the data
# volume — no credentials, hashed or otherwise, live in the repo.

listener 1883
allow_anonymous false
password_file /mosquitto/data/passwordfile
acl_file /mosquitto/data/aclfile

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
