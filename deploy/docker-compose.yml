# Poop Deck :: the stack
# Mosquitto (MQTT) + TimescaleDB (store) + Grafana (UI) + one ingest daemon.
# Same shape on a dev laptop and on the farm's Beelink. Pin every image.
#
# Secrets come from deploy/.env (gitignored — copy deploy/.env.example).
# Always pass the env file so ${VARS} resolve regardless of CWD:
#
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml down        # keep data
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml down -v      # wipe volumes (re-runs migrations on next up)

services:
  timescale:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: poopdeck
      POSTGRES_DB: farm
      # Host/TCP connections authenticate with scram (postgres image default
      # once a password is set). Only the compose network + host loopback can
      # reach 5432 at all — see the bind below. Local socket stays trust, so
      # `docker compose exec timescale psql -U poopdeck` needs no password.
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD in deploy/.env}
    ports:
      # Loopback only: host-local smoke checks work; the LAN cannot reach it.
      # Grafana + the ingest daemon reach timescale:5432 over the compose net.
      - "127.0.0.1:5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      # Applied in filename order on FIRST init (empty volume only). `down -v` to re-run.
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poopdeck -d farm"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    restart: unless-stopped
    ports:
      - "1883:1883"
    environment:
      MQTT_INGEST_USER: ${MQTT_INGEST_USER:?set MQTT_INGEST_USER in deploy/.env}
      MQTT_INGEST_PASSWORD: ${MQTT_INGEST_PASSWORD:?set MQTT_INGEST_PASSWORD in deploy/.env}
      MQTT_TINKLE_USER: ${MQTT_TINKLE_USER:?set MQTT_TINKLE_USER in deploy/.env}
      MQTT_TINKLE_PASSWORD: ${MQTT_TINKLE_PASSWORD:?set MQTT_TINKLE_PASSWORD in deploy/.env}
    # Generate the password file from the env creds on the writable data volume
    # ($$ so the shell — not compose — expands the vars at runtime), copy the ACL
    # off its read-only repo mount so it lands owned by mosquitto with tight
    # perms (else mosquitto warns and future versions refuse to load it), then
    # exec the broker. No credential artifact is ever committed.
    command:
      - /bin/sh
      - -c
      - |
        mosquitto_passwd -b -c /mosquitto/data/passwordfile "$$MQTT_INGEST_USER" "$$MQTT_INGEST_PASSWORD"
        mosquitto_passwd -b /mosquitto/data/passwordfile "$$MQTT_TINKLE_USER" "$$MQTT_TINKLE_PASSWORD"
        cp /mosquitto/config/aclfile.src /mosquitto/data/aclfile
        # mosquitto starts as root then drops to the mosquitto user, so the files
        # it reads must be owned by mosquitto (0700 as root would be unreadable
        # after the drop → "unable to open acl_file"). chown fixes that and
        # silences the ownership warnings.
        chown mosquitto:mosquitto /mosquitto/data/passwordfile /mosquitto/data/aclfile
        chmod 0700 /mosquitto/data/passwordfile /mosquitto/data/aclfile
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Source ACL (ro). The command copies it into the data volume with tight
      # perms/ownership, and mosquitto.conf points acl_file at that copy.
      - ./mosquitto/aclfile:/mosquitto/config/aclfile.src:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  ingest:
    # One dumb daemon per producer (DEC-001). Built from ingest/Dockerfile so the
    # whole pipeline comes up with one `compose up -d` and survives host reboots.
    build:
      context: ../ingest
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ${MQTT_INGEST_USER:?set MQTT_INGEST_USER in deploy/.env}
      MQTT_PASSWORD: ${MQTT_INGEST_PASSWORD:?set MQTT_INGEST_PASSWORD in deploy/.env}
      # Reaches the store over the compose network, not the loopback port.
      PG_DSN: postgresql://poopdeck:${PG_PASSWORD:?set PG_PASSWORD in deploy/.env}@timescale/farm

  grafana:
    image: grafana/grafana-oss:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in deploy/.env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Consumed by the provisioned datasource via $__env{PG_PASSWORD}.
      PG_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD in deploy/.env}
    volumes:
      - grafana-data:/var/lib/grafana
      # Repo-owned provisioning: the TimescaleDB datasource + dashboard provider.
      # Mount the specific subdirs (not the parent) so Grafana's own empty
      # plugins/ and alerting/ provisioning dirs stay intact — no missing-dir errors.
      - ../dashboards/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../dashboards/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      # Dashboard JSON — the provider (poopdeck.yml) reads /etc/dashboards.
      - ../dashboards/tinkle:/etc/dashboards/tinkle:ro
    depends_on:
      timescale:
        condition: service_healthy

volumes:
  timescale-data:
  mosquitto-data:
  mosquitto-log:
  grafana-data:
