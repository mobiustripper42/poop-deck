# Poop Deck :: Grafana datasource — the TimescaleDB store.
# Provisioned in from the repo so the shared Grafana always points at the store.
# Connects over the compose network to the `timescale` service.
apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: poopdeck-timescale
    type: postgres
    access: proxy
    url: timescale:5432
    user: poopdeck
    jsonData:
      database: farm
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    # Password injected from Grafana's env (compose sets PG_PASSWORD from deploy/.env).
    secureJsonData:
      password: $__env{PG_PASSWORD}
    isDefault: true
    editable: false
